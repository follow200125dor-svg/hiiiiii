<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paint Online - FIX</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        
        /* Главный экран */
        #homeScreen { 
            position: fixed; inset: 0; background: #111; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 9999; /* Максимальный приоритет */
        }
        .hidden { display: none !important; }
        
        .box { text-align: center; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #333; }
        input { padding: 15px; width: 200px; border-radius: 8px; border: none; font-size: 16px; margin-bottom: 10px; }
        button#startBtn { 
            padding: 15px 30px; border-radius: 8px; border: none; 
            background: #00ffcc; color: #000; font-weight: bold; 
            cursor: pointer; font-size: 16px; width: 100%;
        }

        /* Панель рисования */
        .paint-ui { 
            position: fixed; top: 10px; left: 10px; display: none; gap: 10px; 
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; z-index: 500; 
        }
    </style>
</head>
<body>

    <div id="homeScreen">
        <div class="box">
            <h2 style="margin-top:0">ВХОД В КОМНАТУ</h2>
            <input type="text" id="roomInput" placeholder="Название..." autofocus>
            <br>
            <button id="startBtn">ВОЙТИ И РИСОВАТЬ</button>
        </div>
    </div>

    <div id="paintUI" class="paint-ui">
        <input type="color" id="colorPicker" value="#00ffcc">
        <button id="clearBtn" style="background:#ff4757; color:#fff; border:none; padding:10px; border-radius:5px; cursor:pointer;">СТЕРЕТЬ</button>
        <button onclick="location.href=location.pathname" style="background:#444; color:#fff; border:none; padding:10px; border-radius:5px;">ВЫХОД</button>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getDatabase, ref, set, push, onChildAdded, remove, onValue } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyASFOrjAJkvfWSPLPVIW5qbC9MuyNm14k0",
            authDomain: "mypaint-2987b.firebaseapp.com",
            databaseURL: "https://mypaint-2987b-default-rtdb.firebaseio.com",
            projectId: "mypaint-2987b",
            storageBucket: "mypaint-2987b.firebasestorage.app",
            messagingSenderId: "178794859176",
            appId: "1:178794859176:web:9a9bef15310be47b13109d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const home = document.getElementById('homeScreen');
        const ui = document.getElementById('paintUI');
        const btn = document.getElementById('startBtn');
        const input = document.getElementById('roomInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Функция запуска
        function join(id) {
            home.classList.add('hidden');
            ui.style.display = 'flex';
            const roomRef = ref(db, 'rooms/' + id);

            // Отрисовка
            onChildAdded(roomRef, (snap) => {
                const p = snap.val();
                ctx.lineWidth = 5;
                ctx.lineCap = 'round';
                ctx.strokeStyle = p.color;
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            });

            // Очистка
            onValue(roomRef, (snap) => {
                if (!snap.exists()) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                }
            });

            let drawing = false;
            const draw = (e) => {
                if (!drawing) return;
                const x = e.clientX || (e.touches && e.touches[0].clientX);
                const y = e.clientY || (e.touches && e.touches[0].clientY);
                push(roomRef, { x, y, color: document.getElementById('colorPicker').value });
            };

            canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
            canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); draw(e); });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
            document.getElementById('clearBtn').onclick = () => remove(roomRef);
        }

        // КЛИК ПО КНОПКЕ
        btn.addEventListener('click', () => {
            const id = input.value.trim();
            if(id) {
                window.history.pushState({}, '', '?room=' + id); // Меняем URL без перезагрузки
                join(id);
            } else {
                alert("Введи имя комнаты!");
            }
        });

        // Вход по Enter
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });

        // Проверка URL при входе
        const roomID = new URLSearchParams(window.location.search).get('room');
        if (roomID) join(roomID);

    </script>
</body>
</html>
