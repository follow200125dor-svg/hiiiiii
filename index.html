<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firebase Paint Fix</title>
    <style>
        body { margin: 0; background: #121212; color: #eee; font-family: sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .overlay.hidden { display: none !important; }
        .ui-panel { position: fixed; top: 10px; left: 10px; display: none; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; backdrop-filter: blur(10px); z-index: 100; }
        input, button { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; font-size: 16px; }
        button { background: #3498db; cursor: pointer; border: none; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); background: #2980b9; }
        .btn-clear { background: #e74c3c; }
        #roomInfo { position: fixed; bottom: 10px; left: 10px; font-size: 12px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="loginScreen" class="overlay">
        <h2 style="margin-bottom: 5px;">ID комнаты</h2>
        <p style="color: #888; margin-bottom: 20px;">Введи любой текст, чтобы войти</p>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="roomInput" placeholder="bro_room_123">
            <button id="joinBtn">Войти</button>
        </div>
    </div>

    <div id="tools" class="ui-panel">
        <input type="color" id="colorPicker" value="#00ffcc">
        <button class="btn-clear" id="clearBtn">Стереть всё</button>
    </div>

    <div id="roomInfo"></div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getDatabase, ref, set, push, onChildAdded, remove, onValue } from "https://www.gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyASFOrjAJkvfWSPLPVIW5qbC9MuyNm14k0",
            authDomain: "mypaint-2987b.firebaseapp.com",
            databaseURL: "https://mypaint-2987b-default-rtdb.firebaseio.com",
            projectId: "mypaint-2987b",
            storageBucket: "mypaint-2987b.firebasestorage.app",
            messagingSenderId: "178794859176",
            appId: "1:178794859176:web:9a9bef15310be47b13109d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loginScreen = document.getElementById('loginScreen');
        const roomInput = document.getElementById('roomInput');
        const joinBtn = document.getElementById('joinBtn');
        const tools = document.getElementById('tools');
        const colorPicker = document.getElementById('colorPicker');
        const clearBtn = document.getElementById('clearBtn');
        const roomInfo = document.getElementById('roomInfo');

        let currentRoomRef = null;
        let drawing = false;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ИСПРАВЛЕННЫЙ КЛИК (через addEventListener)
        joinBtn.addEventListener('click', () => {
            const roomId = roomInput.value.trim();
            if (!roomId) { alert("Введи название!"); return; }

            currentRoomRef = ref(db, 'rooms/' + roomId);
            loginScreen.classList.add('hidden');
            tools.style.display = 'flex';
            roomInfo.innerText = "ID: " + roomId;

            // Слушаем новые линии
            onChildAdded(currentRoomRef, (snap) => {
                const p = snap.val();
                drawOnCanvas(p.x, p.y, p.color);
            });

            // Слушаем очистку холста
            onValue(currentRoomRef, (snap) => {
                if (!snap.exists()) {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.beginPath();
                }
            });
        });

        function drawOnCanvas(x, y, color) {
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = color;
            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        const handleMove = (e) => {
            if (!drawing || !currentRoomRef) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            
            push(currentRoomRef, { x, y, color: colorPicker.value });
        };

        canvas.addEventListener('mousedown', () => { drawing = true; ctx.beginPath(); });
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        
        canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); handleMove(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, {passive: false});
        window.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

        clearBtn.addEventListener('click', () => {
            if (currentRoomRef) remove(currentRoomRef);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
