<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>P2P Рисовалка LIVE</title>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; overflow: hidden; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border: 2px solid #0f0; width: 320px; }
        canvas { background: #fff; cursor: crosshair; display: block; }
        textarea { width: 100%; height: 80px; background: #222; color: #0f0; border: 1px solid #0f0; margin: 5px 0; font-size: 10px; word-break: break-all; }
        button { width: 100%; padding: 10px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        button:active { background: #0a0; }
        .info { font-size: 11px; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div style="font-weight:bold; margin-bottom:5px;">>>> P2P_CONNECTION_SYSTEM</div>
    
    <div id="step1">
        <div class="info">1. Сгенерируй код и отправь другу:</div>
        <button id="btn-create">СОЗДАТЬ КОД</button>
        <textarea id="my-code" readonly></textarea>
    </div>

    <div id="step2">
        <div class="info">2. Вставь код от друга сюда:</div>
        <textarea id="friend-code" placeholder="Вставь сюда..."></textarea>
        <button id="btn-connect">ПОДКЛЮЧИТЬСЯ</button>
    </div>

    <div id="status" style="color: yellow;">СТАТУС: ЛОКАЛЬНЫЙ РЕЖИМ</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    
    // Настройка холста
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // --- ЛОГИКА РИСОВАНИЯ (РАБОТАЕТ СРАЗУ) ---
    let isDrawing = false;
    let dc = null; // Канал данных

    function draw(x, y, color, isLocal = true) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();

        if (isLocal && dc && dc.readyState === 'open') {
            dc.send(JSON.stringify({x, y}));
        }
    }

    canvas.onmousedown = () => isDrawing = true;
    window.onmouseup = () => isDrawing = false;
    canvas.onmousemove = (e) => {
        if (isDrawing) draw(e.clientX, e.clientY, '#00ff00');
    };

    // --- ЛОГИКА P2P (БЕЗ СЕРВЕРОВ) ---
    const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    // Создание предложения
    document.getElementById('btn-create').onclick = async () => {
        dc = pc.createDataChannel("paint");
        setupDataChannel();
        
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        pc.onicecandidate = (e) => {
            if (!e.candidate) {
                document.getElementById('my-code').value = btoa(JSON.stringify(pc.localDescription));
                status.innerText = "СТАТУС: КОД ГОТОВ. ШЛИ ДРУГУ.";
            }
        };
    };

    // Подключение по коду
    document.getElementById('btn-connect').onclick = async () => {
        const rawCode = document.getElementById('friend-code').value.trim();
        if (!rawCode) return;
        
        const remoteDesc = new RTCSessionDescription(JSON.parse(atob(rawCode)));
        await pc.setRemoteDescription(remoteDesc);

        if (remoteDesc.type === 'offer') {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    document.getElementById('my-code').value = btoa(JSON.stringify(pc.localDescription));
                    status.innerText = "СТАТУС: ОТПРАВЬ СВОЙ ОТВЕТ ДРУГУ.";
                }
            };
        } else {
            status.innerText = "СТАТУС: СОЕДИНЕНИЕ...";
        }
    };

    pc.ondatachannel = (e) => {
        dc = e.channel;
        setupDataChannel();
    };

    function setupDataChannel() {
        dc.onopen = () => {
            status.innerText = "СТАТУС: ОНЛАЙН (СВЯЗЬ ПРЯМАЯ)";
            status.style.color = "#0f0";
        };
        dc.onmessage = (e) => {
            const p = JSON.parse(e.data);
            draw(p.x, p.y, '#ff0000', false);
        };
    }
</script>
</body>
</html>
