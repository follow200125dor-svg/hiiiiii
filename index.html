<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Секретная Рисовалка</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; }
        canvas { background: white; cursor: crosshair; touch-action: none; }
        input, button { padding: 8px; border-radius: 5px; border: none; margin: 5px; }
        button { background: #00ff88; font-weight: bold; cursor: pointer; }
        #my-id { color: #00ff88; font-family: monospace; }
    </style>
</head>
<body>

    <div id="ui">
        <div>Твой ключ: <span id="my-id">Генерация...</span></div>
        <input type="text" id="peer-id-input" placeholder="Введи ключ друга">
        <button id="connect-btn">Подключиться</button>
        <button onclick="clearCanvas()">Очистить</button>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const myIdDisplay = document.getElementById('my-id');
        const peerInput = document.getElementById('peer-id-input');
        const connectBtn = document.getElementById('connect-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drawing = false;
        let peer = new Peer(); // Создаем соединение
        let connection;

        // Когда получаем свой ID
        peer.on('open', (id) => { myIdDisplay.innerText = id; });

        // Когда к нам подключаются
        peer.on('connection', (conn) => {
            connection = conn;
            setupConn();
        });

        // Подключаемся к другу
        connectBtn.addEventListener('click', () => {
            connection = peer.connect(peerInput.value);
            setupConn();
        });

        function setupConn() {
            connection.on('data', (data) => {
                draw(data.x, data.y, data.color, false);
            });
            alert("Связь установлена!");
        }

        function draw(x, y, color, emit = true) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 5, 0, Math.PI * 2);
            ctx.fill();

            if (emit && connection && connection.open) {
                connection.send({ x, y, color: '#ff0055' });
            }
        }

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            draw(e.clientX, e.clientY, '#00ff88');
        });

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>
