<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рабочая Рисовалка</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #00ff88; }
        canvas { background: #ffffff; display: block; }
        #status { font-size: 12px; color: #00ff88; margin-top: 5px; }
        button { background: #00ff88; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <div>Твой ID: <b id="my-id">...</b></div>
    <input type="text" id="friend-id" placeholder="ID друга" style="margin: 5px 0; padding: 5px;">
    <br>
    <button onclick="connectToFriend()">Подключиться</button>
    <div id="status">Запуск системы...</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    const myIdDisplay = document.getElementById('my-id');

    // Настройка размера холста
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    let peer = new Peer();
    let conn;

    // Генерируем ID
    peer.on('open', (id) => {
        myIdDisplay.innerText = id;
        status.innerText = "Готов. Скопируй ID и скинь другу.";
    });

    // Принимаем входящее соединение
    peer.on('connection', (c) => {
        conn = c;
        setupChat();
        status.innerText = "Друг подключился!";
    });

    // Подключаемся к другу
    function connectToFriend() {
        const id = document.getElementById('friend-id').value;
        if (id) {
            conn = peer.connect(id);
            setupChat();
            status.innerText = "Подключаюсь...";
        }
    }

    function setupChat() {
        conn.on('open', () => {
            status.innerText = "Связь есть! Можно рисовать.";
        });
        conn.on('data', (data) => {
            draw(data.x, data.y, '#ff4444', false);
        });
    }

    // Функция рисования
    function draw(x, y, color, isLocal = true) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();

        // Отправляем точку другу
        if (isLocal && conn && conn.open) {
            conn.send({ x: x, y: y });
        }
    }

    // Мышка
    let isDrawing = false;
    canvas.onmousedown = () => isDrawing = true;
    canvas.onmouseup = () => isDrawing = false;
    canvas.onmousemove = (e) => {
        if (isDrawing) draw(e.clientX, e.clientY, '#00ff88');
    };

    // Тач (для телефонов)
    canvas.ontouchmove = (e) => {
        const touch = e.touches[0];
        draw(touch.clientX, touch.clientY, '#00ff88');
    };

    // Проверка ошибок
    peer.on('error', (err) => {
        status.innerText = "Ошибка: " + err.type;
        console.error(err);
    });

</script>
</body>
</html>
