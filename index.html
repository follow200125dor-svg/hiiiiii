<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Online Paint</title>
    <!-- Используем надежный Pusher для связи -->
    <script src="https://js.pusher.com"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; z-index: 10; }
        .controls { background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; display: inline-block; }
        canvas { background: white; cursor: crosshair; }
        #room-id { color: #00ff88; font-weight: bold; cursor: pointer; border-bottom: 1px dashed; }
    </style>
</head>
<body>

<div id="ui">
    <div class="controls">
        Комната: <span id="room-id" onclick="changeRoom()">загрузка...</span> 
        (нажми, чтобы сменить)
        <br><br>
        <button onclick="clearCanvas()">Очистить у всех</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Генерируем ID комнаты или берем из ссылки
    let room = window.location.hash.substring(1) || Math.random().toString(36).substring(7);
    window.location.hash = room;
    document.getElementById('room-id').innerText = room;

    // Настройка связи (публичный ключ для тестов)
    const pusher = new Pusher('de504746473181ea097a', { cluster: 'mt1' });
    const channel = pusher.subscribe('drawing-' + room);

    // Слушаем чужие мазки
    channel.bind('draw', (data) => {
        drawCircle(data.x, data.y, data.color);
    });

    channel.bind('clear', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    let drawing = false;

    function drawCircle(x, y, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    function sendPoint(x, y) {
        // Отправляем свои точки в интернет
        fetch(`https://p-node-server.vercel.app{room}&x=${x}&y=${y}&color=red`);
    }

    canvas.addEventListener('mousedown', () => drawing = true);
    window.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        drawCircle(e.clientX, e.clientY, '#00ff88');
        sendPoint(e.clientX, e.clientY);
    });

    // Для мобилок
    canvas.addEventListener('touchmove', (e) => {
        const t = e.touches[0];
        drawCircle(t.clientX, t.clientY, '#00ff88');
        sendPoint(t.clientX, t.clientY);
    });

    function clearCanvas() {
        fetch(`https://p-node-server.vercel.app{room}`);
    }

    function changeRoom() {
        const newRoom = prompt("Введи название комнаты:");
        if (newRoom) window.location.hash = newRoom;
        location.reload();
    }
</script>

</body>
</html>
