<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Бро, рисуем онлайн!</title>
    <style>
        body { margin: 0; background: #0f0f0f; color: #fff; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; cursor: crosshair; }
        .menu { position: fixed; top: 15px; left: 15px; display: flex; gap: 10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); z-index: 100; }
        input[type="color"] { border: none; width: 35px; height: 35px; cursor: pointer; background: none; }
        button { background: #ff4757; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background: #ff6b81; }
        #status { position: fixed; bottom: 10px; right: 15px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <div class="menu">
        <input type="color" id="colorPicker" value="#00ffcc">
        <button id="clearBtn">Очистить всё</button>
    </div>
    <div id="status">Подключение к Firebase...</div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com";
        import { getDatabase, ref, set, push, onChildAdded, remove, onValue } from "https://www.gstatic.com";

        // ТВОЙ КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyASFOrjAJkvfWSPLPVIW5qbC9MuyNm14k0",
            authDomain: "mypaint-2987b.firebaseapp.com",
            databaseURL: "https://mypaint-2987b-default-rtdb.firebaseio.com",
            projectId: "mypaint-2987b",
            storageBucket: "mypaint-2987b.firebasestorage.app",
            messagingSenderId: "178794859176",
            appId: "1:178794859176:web:9a9bef15310be47b13109d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const drawRef = ref(db, 'drawing_data');

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let drawing = false;

        // Отправка точки в БД
        const sendPoint = (e) => {
            if (!drawing) return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            
            const newPoint = push(drawRef);
            set(newPoint, { x, y, color: colorPicker.value });
        };

        canvas.addEventListener('mousedown', () => drawing = true);
        canvas.addEventListener('mousemove', sendPoint);
        canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
        
        canvas.addEventListener('touchstart', (e) => { drawing = true; sendPoint(e); });
        canvas.addEventListener('touchmove', sendPoint);
        canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });

        // Отрисовка из БД для всех
        onChildAdded(drawRef, (snap) => {
            const p = snap.val();
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = p.color;
            
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            document.getElementById('status').innerText = "Online";
        });

        // Кнопка очистки
        document.getElementById('clearBtn').onclick = () => remove(drawRef);

        // Синхронная очистка у всех
        onValue(drawRef, (snap) => {
            if (!snap.exists()) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
            }
        });

        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };
    </script>
</body>
</html>
