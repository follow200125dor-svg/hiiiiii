<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Direct P2P Paint</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #ui { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.9); padding: 15px; border-radius: 10px; border: 1px solid #ff00ff; width: 300px; font-size: 12px; }
        canvas { background: #fff; cursor: crosshair; }
        textarea { width: 100%; height: 60px; background: #333; color: #0f0; border: 1px solid #555; font-size: 10px; margin: 5px 0; }
        button { width: 100%; padding: 8px; background: #ff00ff; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .step { margin-bottom: 10px; border-bottom: 1px solid #444; padding-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="step">
        <b>1. Твой секретный код:</b>
        <textarea id="myCode" readonly placeholder="Нажми Создать..."></textarea>
        <button onclick="createOffer()">Создать код для друга</button>
    </div>
    
    <div class="step">
        <b>2. Код от друга:</b>
        <textarea id="friendCode" placeholder="Вставь код друга сюда..."></textarea>
        <button onclick="connectFriend()">Подключиться к другу</button>
    </div>
    <div id="status" style="color: #ff00ff;">Статус: Локально</div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Конфигурация для пробивки интернета (бесплатные Google сервера)
    const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
    });

    let dc = null; // Канал данных

    // Создание подключения (шаг 1)
    async function createOffer() {
        dc = pc.createDataChannel("chat");
        setupDc();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        // Ждем сбора путей связи
        pc.onicecandidate = (e) => {
            if (!e.candidate) document.getElementById('myCode').value = JSON.stringify(pc.localDescription);
        };
    }

    // Ответ на подключение (шаг 2)
    async function connectFriend() {
        const txt = document.getElementById('friendCode').value;
        const remoteDesc = new RTCSessionDescription(JSON.parse(txt));
        await pc.setRemoteDescription(remoteDesc);

        if (remoteDesc.type === 'offer') {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            pc.onicecandidate = (e) => {
                if (!e.candidate) document.getElementById('myCode').value = JSON.stringify(pc.localDescription);
            };
            document.getElementById('status').innerText = "Статус: Отправь свой код обратно!";
        } else {
            document.getElementById('status').innerText = "Статус: Соединение установлено!";
        }
    }

    pc.ondatachannel = (e) => {
        dc = e.channel;
        setupDc();
    };

    function setupDc() {
        dc.onopen = () => document.getElementById('status').innerText = "Статус: ОНЛАЙН!";
        dc.onmessage = (e) => {
            const d = JSON.parse(e.data);
            draw(d.x, d.y, '#ff0000', false);
        };
    }

    function draw(x, y, color, send = true) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 5, 0, Math.PI * 2);
        ctx.fill();
        if (send && dc && dc.readyState === 'open') {
            dc.send(JSON.stringify({x, y}));
        }
    }

    let drawing = false;
    canvas.onmousedown = () => drawing = true;
    window.onmouseup = () => drawing = false;
    canvas.onmousemove = (e) => { if (drawing) draw(e.clientX, e.clientY, '#00ff88'); };

</script>
</body>
</html>
